<body class="bg-surface text-on-surface font-body-md text-body-md antialiased min-h-screen flex items-center justify-center p-md md:p-lg">
<!-- Decorative background element to add a touch of premium feel without clutter -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden flex justify-center items-center">
<div class="w-[80vw] h-[80vw] max-w-[1000px] max-h-[1000px] rounded-full bg-gradient-to-tr from-surface-variant/30 to-surface-container-low/50 blur-3xl opacity-50"></div>
</div>
<!-- Registration Card -->
<div class="w-full max-w-lg bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-outline-variant/30 p-md md:p-lg relative overflow-hidden flex flex-col gap-md">
<!-- Header -->
<div class="flex flex-col items-center text-center gap-base mb-sm">
<h1 class="font-display text-h1 font-black tracking-tighter text-primary">LUMINA</h1>
<h2 class="font-h2 text-h2 text-on-surface mt-sm">Create an Account</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant max-w-[80%] mx-auto">Join our community for an elevated shopping experience and exclusive early access.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Name Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- First Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="firstName">First Name</label>
<input class="w-full bg-transparent border border-outline-variant rounded-DEFAULT p-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="firstName" name="firstName" placeholder="Jane" required="" type="text"/>
</div>
<!-- Last Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="lastName">Last Name</label>
<input class="w-full bg-transparent border border-outline-variant rounded-DEFAULT p-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="lastName" name="lastName" placeholder="Doe" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none">mail</span>
<input class="w-full bg-transparent border border-outline-variant rounded-DEFAULT py-sm pl-[40px] pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="email" name="email" placeholder="jane.doe@example.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none">lock</span>
<input class="w-full bg-transparent border border-outline-variant rounded-DEFAULT py-sm pl-[40px] pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Validation Hint -->
<div class="flex items-center gap-xs mt-1 ml-xs">
<span class="material-symbols-outlined text-outline text-[14px]">info</span>
<span class="font-body-sm text-[11px] leading-tight text-outline">Must be at least 8 characters, with one uppercase letter and one number.</span>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none">lock_reset</span>
<input class="w-full bg-transparent border border-outline-variant rounded-DEFAULT py-sm pl-[40px] pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-sm bg-primary text-on-primary py-sm px-md rounded-DEFAULT font-label-md text-label-md hover:opacity-90 transition-opacity flex items-center justify-center gap-xs" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm my-sm opacity-50">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Or</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Login Link -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="font-label-md text-label-md text-primary hover:underline underline-offset-4 decoration-primary/30 hover:decoration-primary transition-all" href="#">Log In</a>
</p>
</div>
</div>
