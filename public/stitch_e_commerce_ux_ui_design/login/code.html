<p class="font-body-sm text-body-sm text-on-surface-variant">Enter your details to access your account.</p>
</div>
<form class="flex flex-col gap-sm">
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" style="font-size: 20px;">mail</span>
<input class="w-full h-12 pl-[40px] pr-sm rounded-DEFAULT border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-colors placeholder:text-outline-variant/60" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" style="font-size: 20px;">lock</span>
<input class="w-full h-12 pl-[40px] pr-sm rounded-DEFAULT border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-colors placeholder:text-outline-variant/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between mt-xs mb-sm">
<div class="flex items-center gap-xs">
<input class="w-4 h-4 rounded-sm border-outline-variant text-secondary focus:ring-secondary cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember me</label>
</div>
<a class="font-label-sm text-label-sm text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full h-12 rounded-DEFAULT bg-secondary text-on-secondary font-label-md text-label-md flex items-center justify-center hover:bg-on-secondary-fixed-variant transition-colors shadow-sm" type="submit">
                Login
            </button>
</form>
<div class="mt-md mb-md flex items-center gap-sm">
<div class="flex-1 h-px bg-outline-variant/30"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">Or continue with</span>
<div class="flex-1 h-px bg-outline-variant/30"></div>
</div>
<div class="flex flex-col gap-sm">
<button class="w-full h-12 rounded-DEFAULT border border-outline-variant text-on-surface font-label-md text-label-md flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors" type="button">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google G Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD36Ifv77oyZx458ZP9FVMXXGP-4Ofz9I40CvqOahAB9CSUdBJKaMlNpsxQ-Rl1JH711O2r5kTWaVhoz3xCuN5uPNKEd7Px2BeUScMfHBb9KTYWLBT5Y1j19jJ54QbAj7oVPASpH5pgA0QNDjTh0_lHxzp2h1rlUFMpYm4B9WqCzH0Xy9NiHy-3zS55wYiFxnpnBybH9Gbrt4Lkz4wTtl0FbrDhsxYbqxiMqtAcmmu3Obwd8IyORSZ8hMOsTJqtX1v638Ls0Trlrdei"/>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 24px;">ios</span>
